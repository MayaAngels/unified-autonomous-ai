<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Vision Board</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#fff;color:#111;padding:40px;}
h1{font-size:48px;}
.subtitle{color:#666;margin-bottom:40px;border-left:4px solid #ff69b4;padding-left:16px;}
.vision-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:24px;}
.vision-card{background:#fafafa;border-radius:16px;padding:24px;border:1px solid #eee;}
.vision-icon{font-size:32px;margin-bottom:16px;}
.vision-description{font-size:16px;margin-bottom:16px;}
.vision-date{font-size:12px;color:#999;}
.btn-create{background:#111;color:#fff;border:none;padding:12px 24px;border-radius:12px;cursor:pointer;margin-top:30px;}
.floating{position:fixed;bottom:30px;right:30px;width:60px;height:60px;background:#ff69b4;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;}
</style>
</head>
<body>
<h1>✨ Vision Board</h1>
<div class="subtitle">Where ideas become builders. Where builders become reality.</div>
<div id="vision-grid" class="vision-grid"></div>
<button class="btn-create" onclick="captureVision()">✨ Capture New Vision</button>
<div class="floating" onclick="captureVision()">✨</div>
<script>
function loadVisions() {
    let visions = JSON.parse(localStorage.getItem('visions') || '[]');
    let grid = document.getElementById('vision-grid');
    if(visions.length===0){ grid.innerHTML='<div style="text-align:center;padding:60px;color:#999;">No visions yet. Click ✨ to capture your first vision.</div>'; return; }
    grid.innerHTML = visions.map(v => `<div class="vision-card"><div class="vision-icon">✨</div><div class="vision-description">${escapeHtml(v.description)}</div><div class="vision-date">${new Date(v.timestamp).toLocaleString()}</div></div>`).join('');
}
function captureVision() {
    let idea = prompt('✨ What is your vision?');
    if(idea) {
        let visions = JSON.parse(localStorage.getItem('visions') || '[]');
        visions.unshift({ id: Date.now(), description: idea, timestamp: new Date().toISOString() });
        localStorage.setItem('visions', JSON.stringify(visions));
        loadVisions();
        alert('✨ Vision captured!');
    }
}
function escapeHtml(t){ return t.replace(/[&<>]/g,function(m){ return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';}); }
loadVisions();
</script>
</body>
</html>
