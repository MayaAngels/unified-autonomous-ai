<!DOCTYPE html><html><head><title>Launch Dashboard</title><style>body{font-family:system-ui;background:#fff;padding:20px}.card{background:#f5f5f5;border-radius:16px;padding:20px;margin:10px 0}.value{font-size:32px;font-weight:700}.progress{background:#ddd;height:20px;border-radius:20px;overflow:hidden}.fill{background:#111;height:100%;width:0%}.vi{position:fixed;bottom:20px;right:20px;width:50px;height:50px;background:#111;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;cursor:pointer}</style></head><body><h1>Launch Dashboard</h1><div class="card"><div class="value" id="revenue">$0</div><div>Revenue</div><div class="progress"><div class="fill" id="progress"></div></div></div><div class="card"><div class="value" id="sales">0</div><div>Sales</div></div><div class="vi" onclick="alert("Vi: Keep going!")">?</div><script>let data={revenue:0,sales:0,target:940};function update(){document.getElementById("revenue").innerText="$"+data.revenue;document.getElementById("sales").innerText=data.sales;document.getElementById("progress").style.width=(data.revenue/data.target*100)+"%";}function addSale(){data.sales++;data.revenue=data.sales*47;update();localStorage.setItem("launch",JSON.stringify(data));}let saved=localStorage.getItem("launch");if(saved){data=JSON.parse(saved);update();}document.addEventListener("keydown",function(e){if(e.key==="s")addSale();});</script><div class="vi" onclick="alert("Vi: Press S to add a test sale")">?</div></body></html>
