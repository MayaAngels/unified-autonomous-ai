<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Your Account | The Vital Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .auth-container {
            max-width: 520px;
            width: 100%;
            background: #fafafa;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid #e8e8e8;
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 48px; font-weight: bold; color: #111; font-family: monospace; }
        .logo-text { font-size: 12px; color: #888; margin-top: 8px; letter-spacing: 1px; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .description { color: #666; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; background: #fff; }
        input:focus { outline: none; border-color: #111; }
        .btn-primary, .btn-secondary {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: #111; color: #fff; }
        .btn-primary:hover { background: #333; }
        .btn-secondary { background: #f0f0f0; color: #111; border: 1px solid #ddd; }
        .back-link { display: block; text-align: center; margin-top: 24px; color: #60a5fa; text-decoration: none; font-size: 14px; }
        .vi-button {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            background: #111;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
        }
        .vi-icon { font-size: 24px; font-weight: bold; color: #fff; font-family: monospace; }
        .success-message { background: #e8f5e9; color: #2e7d32; padding: 12px; border-radius: 12px; margin-bottom: 20px; }
        .error-message { background: #ffebee; color: #c62828; padding: 12px; border-radius: 12px; margin-bottom: 20px; }
        .secret-box { background: #f5f5f5; padding: 12px; border-radius: 8px; font-family: monospace; text-align: center; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">∇</div>
            <div class="logo-text">THE VITAL STUDIO</div>
        </div>
        <h1>Secure Your Account</h1>
        <p class="description">Set up two-factor authentication for enhanced security</p>
        
        <div id="message-area"></div>
        
        <div class="form-group" id="qr-container" style="text-align: center;">
            <div style="background: #fff; padding: 16px; display: inline-block; border-radius: 12px; border: 1px solid #ddd;">
                <div id="qr-code-loading">Loading QR code...</div>
            </div>
        </div>
        
        <div class="form-group">
            <label>Secret Key (Manual Entry)</label>
            <div class="secret-box" id="secret-key-display">Generating...</div>
            <button class="btn-secondary" onclick="copySecretKey()" style="margin-top: 8px; width: 100%;">Copy Secret Key</button>
        </div>
        
        <div class="form-group">
            <label>Verification Code</label>
            <input type="text" id="verification-code" placeholder="000000" maxlength="6" autocomplete="off">
        </div>
        
        <button class="btn-primary" onclick="verifyAndEnable()" style="width: 100%;">Verify & Enable 2FA</button>
        <a href="/index.html" class="back-link">← Skip for now</a>
    </div>
    <div class="vi-button" onclick="alert('Vi Assistant: Two-factor authentication adds an extra layer of security to your account.')">
        <div class="vi-icon">∇</div>
    </div>
    
    <script src="/js/features/auth/two-factor/totp-generator.js"></script>
    <script src="/js/features/auth/two-factor/qr-code.js"></script>
    <script src="/js/features/auth/two-factor/verify.js"></script>
    <script>
        let currentSecret = '';
        let totpGenerator = null;
        let qrGenerator = null;
        let verification = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            totpGenerator = new TOTPGenerator();
            qrGenerator = new QRCodeGenerator();
            verification = new TwoFactorVerification();
            
            // Generate new secret
            currentSecret = totpGenerator.generateSecret(16);
            document.getElementById('secret-key-display').innerText = currentSecret;
            
            // Generate QR code
            const url = qrGenerator.generateTOTPUrl(currentSecret, 'Vital Studio User', 'The Vital Studio');
            const qrImageUrl = qrGenerator.getQRCodeImageUrl(url);
            document.getElementById('qr-container').innerHTML = `
                <div style="background: #fff; padding: 16px; display: inline-block; border-radius: 12px; border: 1px solid #ddd;">
                    <img src="${qrImageUrl}" alt="QR Code" style="width: 200px; height: 200px;">
                    <p style="font-size: 12px; color: #888; margin-top: 8px;">Scan with authenticator app</p>
                </div>
            `;
        });
        
        function copySecretKey() {
            navigator.clipboard.writeText(currentSecret);
            showMessage('Secret key copied to clipboard!', 'success');
        }
        
        function showMessage(msg, type) {
            const area = document.getElementById('message-area');
            area.innerHTML = `<div class="${type}-message">${msg}</div>`;
            setTimeout(() => {
                area.innerHTML = '';
            }, 5000);
        }
        
        async function verifyAndEnable() {
            const code = document.getElementById('verification-code').value;
            if (!code || code.length !== 6) {
                showMessage('Please enter a valid 6-digit code', 'error');
                return;
            }
            
            const result = verification.completeSetup(currentSecret, code);
            
            if (result.success) {
                showMessage('2FA enabled successfully! Redirecting...', 'success');
                // Store recovery codes
                sessionStorage.setItem('recovery_codes', JSON.stringify(result.recoveryCodes));
                setTimeout(() => {
                    window.location.href = '/pages/two-factor-recovery.html';
                }, 1500);
            } else {
                showMessage(result.error || 'Invalid verification code', 'error');
            }
        }
    </script>
</body>
</html>
