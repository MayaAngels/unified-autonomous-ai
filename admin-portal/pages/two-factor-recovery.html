<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Codes | The Vital Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .auth-container {
            max-width: 520px;
            width: 100%;
            background: #fafafa;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid #e8e8e8;
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 48px; font-weight: bold; color: #111; font-family: monospace; }
        .logo-text { font-size: 12px; color: #888; margin-top: 8px; letter-spacing: 1px; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .description { color: #666; margin-bottom: 24px; font-size: 14px; }
        .warning-box { background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .codes-container {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .code-row { display: inline-block; width: 45%; padding: 8px; margin: 4px; background: #fff; border-radius: 8px; }
        .btn-primary, .btn-secondary {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: #111; color: #fff; width: 100%; margin-bottom: 12px; }
        .btn-secondary { background: #f0f0f0; color: #111; border: 1px solid #ddd; width: 48%; }
        .back-link { display: block; text-align: center; margin-top: 24px; color: #60a5fa; text-decoration: none; font-size: 14px; }
        .vi-button {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            background: #111;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
        }
        .vi-icon { font-size: 24px; font-weight: bold; color: #fff; font-family: monospace; }
        .button-group { display: flex; gap: 12px; justify-content: center; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">∇</div>
            <div class="logo-text">THE VITAL STUDIO</div>
        </div>
        <h1>Recovery Codes</h1>
        <p class="description">Save these backup codes in a secure location</p>
        
        <div class="warning-box">
            ⚠️ Each code can only be used once. Store these safely.
        </div>
        
        <div class="codes-container" id="codes-container">
            Loading codes...
        </div>
        
        <div class="button-group">
            <button class="btn-secondary" onclick="downloadCodes()">Download Codes</button>
            <button class="btn-secondary" onclick="printCodes()">Print Codes</button>
        </div>
        
        <button class="btn-primary" onclick="confirmComplete()" style="margin-top: 16px;">I've Saved My Codes →</button>
        <a href="/index.html" class="back-link">← Back to Dashboard</a>
    </div>
    <div class="vi-button" onclick="alert('Vi Assistant: Store these recovery codes somewhere safe, like a password manager.')">
        <div class="vi-icon">∇</div>
    </div>
    
    <script>
        let recoveryCodes = [];
        
        document.addEventListener('DOMContentLoaded', function() {
            const stored = sessionStorage.getItem('recovery_codes');
            if (stored) {
                recoveryCodes = JSON.parse(stored);
                displayCodes();
            } else {
                // Generate new codes if none exist
                recoveryCodes = [];
                for (let i = 0; i < 8; i++) {
                    const code = Math.random().toString(36).substring(2, 10).toUpperCase();
                    recoveryCodes.push(code);
                }
                sessionStorage.setItem('recovery_codes', JSON.stringify(recoveryCodes));
                displayCodes();
            }
        });
        
        function displayCodes() {
            const container = document.getElementById('codes-container');
            if (container && recoveryCodes.length) {
                let html = '';
                for (let i = 0; i < recoveryCodes.length; i++) {
                    html += `<div class="code-row">${(i+1).toString().padStart(2, '0')}. ${recoveryCodes[i]}</div>`;
                }
                container.innerHTML = html;
            }
        }
        
        function downloadCodes() {
            const content = recoveryCodes.join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'vital-studio-recovery-codes.txt';
            a.click();
            URL.revokeObjectURL(url);
            alert('Recovery codes downloaded! Store them safely.');
        }
        
        function printCodes() {
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html><head><title>Recovery Codes - The Vital Studio</title></head>
                <body style="font-family: monospace; padding: 40px; text-align: center;">
                    <h1>The Vital Studio - Recovery Codes</h1>
                    <p>Store these codes safely. Each code can be used once.</p>
                    <div style="margin: 40px 0;">
                        ${recoveryCodes.map((c, i) => `${(i+1).toString().padStart(2, '0')}. ${c}`).join('<br>')}
                    </div>
                    <p>Generated: ${new Date().toLocaleString()}</p>
                </body></html>
            `);
            printWindow.document.close();
            printWindow.print();
        }
        
        function confirmComplete() {
            sessionStorage.setItem('recovery_codes_confirmed', 'true');
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
