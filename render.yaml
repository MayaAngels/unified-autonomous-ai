services:
  - type: web
    name: unified-autonomous-ai
    runtime: image
    repo: https://github.com/MayaAngels/unified-autonomous-ai
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DAMPING_FACTOR
        value: 0.3
      - key: HISTORY_WINDOW_HOURS
        value: 24
      - key: OBSERVATION_INTERVAL
        value: 30
      - key: LOG_LEVEL
        value: info
